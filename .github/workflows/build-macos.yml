name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build UnBlock.app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          cd Mac
          python -m pip install --upgrade pip
          pip install -r requirements.txt --only-binary :all: || pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: |
          cd Mac
          rm -rf build dist
          pyinstaller --clean build.spec
      - name: Codesign
        run: |
          cd Mac/dist
          codesign --force --deep --sign - UnBlock.app || true
          chmod +x UnBlock.app/Contents/MacOS/UnBlock || true
      - name: Zip
        run: |
          cd Mac/dist
          ditto -c -k --keepParent UnBlock.app UnBlock-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: UnBlock-macOS-zip
          path: Mac/dist/UnBlock-macOS.zip
          retention-days: 90
