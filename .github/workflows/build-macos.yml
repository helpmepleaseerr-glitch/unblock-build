name: Build macOS App (DMG)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          cd Mac
          python -m pip install --upgrade pip
          pip install -r requirements.txt --only-binary :all: || pip install -r requirements.txt
          pip install pyinstaller
      - name: Build .app
        run: |
          cd Mac
          rm -rf build dist
          pyinstaller --clean build.spec
      - name: Codesign
        run: |
          cd Mac/dist
          codesign --force --deep --sign - UnBlock.app || true
          chmod +x UnBlock.app/Contents/MacOS/UnBlock || true
      - name: Verify .app structure
        run: |
          cd Mac/dist
          echo "=== .app contents ==="
          ls -la UnBlock.app/Contents/
          echo "=== executable ==="
          ls -la UnBlock.app/Contents/MacOS/
          echo "=== Info.plist ==="
          cat UnBlock.app/Contents/Info.plist
      - name: Create DMG
        run: |
          cd Mac/dist
          # Создаём временную папку для DMG-содержимого
          mkdir -p dmg_staging
          cp -R UnBlock.app dmg_staging/
          # Создаём symlink на /Applications для drag-and-drop
          ln -s /Applications dmg_staging/Applications
          # Создаём DMG с compressией
          hdiutil create -volname "UnBlock" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            UnBlock-macOS.dmg
          # Проверка
          ls -lh UnBlock-macOS.dmg
          hdiutil verify UnBlock-macOS.dmg
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: UnBlock-macOS-dmg
          path: Mac/dist/UnBlock-macOS.dmg
          retention-days: 90
